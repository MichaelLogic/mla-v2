# MLA Portal Core FE - Node, React

trigger:
  branches:
    include:
      - master

stages:
  - stage: Build
    displayName: 'Build Dream Merchant Marketing App'
    pool: '$(agtPool)'
    jobs:
    - job: BuildFrontend
      displayName: 'Install Node, Build, & Publish Artifact'
      pool: '$(agtPool)'
      steps:
      # Create or update the ACR resource
      - task: AzureResourceGroupDeployment@2
        displayName: 'Azure Deployment:Update Azure Container Registry'
        inputs:
          azureSubscription: '$(azureServiceConnectionId)'
          resourceGroupName: '$(resourcesGroupName)'
          location: '$(regionLocation)'
          csmFile: '$(Build.SourcesDirectory)/**/containerRegistry-template.json'
          overrideParameters: '-registryName "$(dockerRegistryName)" -registryLocation "$(regionLocation)" -registrySku standard'

      - task: NodeTool@0
        inputs:
          versionSpec: '14.x'
        displayName: 'Install Node.js'

      - task: CmdLine@2
        displayName: 'Install Essential Modules & Build React UI'
        inputs:
          script: |
            cd '$(Build.SourcesDirectory)' # path to Node source
            npm install
            npm run build
      
      - task: npmAuthenticate@0
        displayName: Authenticate with NPM
        inputs:
          workingFile: $(Build.SourcesDirectory)/.npmrc
          
      - task: CmdLine@2
        displayName: 'Publish Dream Merchant Build Artifact'
        inputs:
          script: |
            cd '$(Build.SourcesDirectory)' # path to Node source
            npm publish

      #Build & Push Image to Container Registry
      - task: Docker@2
        inputs:
          containerRegistry: $(acrServiceName)
          repository: '$(frontEndImageName)'
          command: 'buildAndPush'
          Dockerfile: '**/Dockerfile'
          tags: |
            $(Build.BuildId)
            alpha

      - task: AzureCLI@2
        displayName: 'Remove Installed Assets B4 Artifacting'
        inputs:
          azureSubscription: '$(azureServiceConnectionId)'
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
              cd $(Build.SourcesDirectory)
              rm -r node_modules
        #condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

      # Copy ARM templates
      - task: CopyFiles@2
        displayName: 'Copy Artifact Assets'
        inputs:
          SourceFolder: $(Build.SourcesDirectory)
          TargetFolder: '$(Build.ArtifactStagingDirectory)'

      - task: PublishBuildArtifacts@1
        inputs:
          pathToPublish: '$(Build.ArtifactStagingDirectory)'
          artifactName: "drop_$(frontEndImageName)"

